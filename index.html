<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QYZ UZATU</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<audio id="backgroundMusic" src="music.mp3" loop></audio>


<!-- ЭКРАН 1 -->
<section class="screen video-screen" id="screen1">

<video id="introVideo" muted playsinline preload="auto">
    <source src="intro.mp4" type="video/mp4">
</video>


<button id="startButton" class="start-button">
    Бастау
</button>


</section>





<!-- ЭКРАН 2 -->
<section class="screen image-screen">

<img class="background-image" src="images/priglashenie.jpg">

<img class="ornament ornament-one"
src="images/ornament.png">

<img class="ornament ornament-two"
src="images/ornament.png">

</section>






<!-- ЭКРАН 3 -->
<section class="screen image-screen">

<img class="background-image" src="images/calendar.jpg">


<div class="timer">

<div>
<span id="days">00</span>
<small>күн</small>
</div>

<div>
<span id="hours">00</span>
<small>сағат</small>
</div>

<div>
<span id="minutes">00</span>
<small>мин</small>
</div>

<div>
<span id="seconds">00</span>
<small>сек</small>
</div>

</div>


<img class="ornament calendar-one"
src="images/ornament.png">

<img class="ornament calendar-two"
src="images/ornament.png">


</section>







<!-- ЭКРАН 4 -->
<section class="screen image-screen">

<img class="background-image" src="images/restaurant.jpg">


<a class="main-button"
href="https://go.2gis.com/oMi0v"
target="_blank">

Бағытты ашу

</a>


</section>








<!-- ЭКРАН 5 -->
<section class="screen image-screen">

<img class="background-image" src="images/organizator.jpg">


<img class="ornament organizer-one"
src="images/ornament.png">

<img class="ornament organizer-two"
src="images/ornament.png">


</section>








<!-- ЭКРАН 6 -->
<section class="screen image-screen">

<img class="background-image" src="images/opros.jpg">


<div class="survey-box">


<a class="main-button"
href="https://docs.google.com/forms/d/e/1FAIpQLSeGKM8yr-TycYPWJp2HcV-cEz4FapKGVsrJFfp6cmEsNFmbjw/viewform?usp=publish-editor"
target="_blank">

Қатысатыңызды растау

</a>


<p>
Сауалнамаға жауап беруіңізді сұраймыз
</p>


</div>


</section>








<!-- ЭКРАН 7 -->
<section class="screen image-screen">

<img class="background-image"
src="images/konec.jpg">


<div class="final-text">

Сіздерді біздің ерекше кешімізде күтеміз!

</div>



<img class="ornament final-one"
src="images/ornament.png">

<img class="ornament final-two"
src="images/ornament.png">


</section>






<script src="script.js"></script>

</body>
</html>
